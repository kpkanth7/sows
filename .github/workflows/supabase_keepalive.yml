name: Supabase Keepalive (every 12hr)

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  keepalive:
    name: Ping Supabase to prevent free-tier pause
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r scripts/requirements.txt
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python3 -c "
          import os
          from supabase import create_client
          url = os.environ['SUPABASE_URL']
          key = os.environ['SUPABASE_SERVICE_ROLE_KEY']
          sb = create_client(url, key)
          result = sb.rpc('keepalive').execute()
          print('Supabase keepalive:', result.data)
          "

      - name: Prune data older than 90 days
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PYTHONPATH: scripts
        run: python scripts/cleanup_old_data.py

      # Phase 3.2: compute post-earnings sentiment delta for any row whose
      # T+7 window has closed. Idempotent — only fills rows where delta IS NULL.
      - name: Compute post-earnings sentiment delta
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PYTHONPATH: scripts
        run: python scripts/compute_earnings_delta.py

      # Phase 3.11: recompute dark-horse rankings (truncate + insert top 20).
      - name: Compute dark-horse movers
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PYTHONPATH: scripts
        run: python scripts/compute_dark_horses.py
