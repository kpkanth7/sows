name: Ingest Influencers (Manual - Deprecated)

on:
  workflow_dispatch:

jobs:
  youtube:
    name: YouTube Channel Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: scripts
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r scripts/requirements.txt
      - name: Scan YouTube channels
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          LLM_PROVIDER_CHAIN: ${{ secrets.LLM_PROVIDER_CHAIN }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
        run: python -m scripts.ingest_youtube

  bluesky:
    name: Bluesky Account Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: scripts
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r scripts/requirements.txt
      - name: Scan Bluesky accounts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m scripts.ingest_bluesky

  reddit:
    name: Reddit Community Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: scripts
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r scripts/requirements.txt
      - name: Scan Reddit subreddits
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
        run: python -m scripts.ingest_reddit

  github_signals:
    name: GitHub Trending + Releases
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: scripts
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r scripts/requirements.txt
      - name: Scan GitHub
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python -m scripts.ingest_github
