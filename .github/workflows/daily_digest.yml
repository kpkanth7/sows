name: Daily Investor Digest

# Phase 3.7: once-daily LLM synthesis of last-24h signals into a
# 1-paragraph investor digest, persisted to `daily_digests`.
# Runs 02:00 UTC — after the late-night LLM batch + most ingestors have
# finished, so the digest is built from the freshest data.
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  digest:
    name: Generate Daily Digest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: scripts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r scripts/requirements.txt
      - name: Run digest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python scripts/generate_daily_digest.py
