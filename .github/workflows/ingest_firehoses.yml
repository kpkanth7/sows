name: Ingest Firehoses (Hourly)

# Free, no-key global news firehoses: GDELT (added 2.2), SEC EDGAR (2.3), arXiv (2.4).
# All steps continue-on-error so one source's outage can't drop the others.
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  ingest_firehoses:
    name: Poll Firehoses
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: scripts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r scripts/requirements.txt

      - name: GDELT 2.0
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/ingest_gdelt.py

      - name: SEC EDGAR 8-K
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: python scripts/ingest_sec.py

      - name: arXiv
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/ingest_arxiv.py

      # Phase 3.5: CourtListener lawsuit / docket tracker. Token recommended
      # for the 5000/hr quota; without it the script falls back to unauth.
      - name: CourtListener
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          COURTLISTENER_API_TOKEN: ${{ secrets.COURTLISTENER_API_TOKEN }}
        run: python scripts/ingest_courtlistener.py
