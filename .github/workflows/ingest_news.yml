name: Ingest News (Manual - Deprecated)

on:
  workflow_dispatch:  # Allow manual trigger only

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run news ingestor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          THENEWSAPI_KEY: ${{ secrets.THENEWSAPI_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: python -m scripts.ingest_news

      - name: Check buzz spikes
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m scripts.check_buzz_spikes
