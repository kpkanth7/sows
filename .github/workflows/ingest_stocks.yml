name: Ingest Stocks (Tiered)

on:
  schedule:
    # Tier 1: every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      tier:
        description: "Which tier to run (1, 2, 3, or all)"
        required: false
        default: "all"

jobs:
  tier1:
    name: Tier 1 Stocks (15min)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r scripts/requirements.txt
      - name: Ingest Tier 1
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: python -m scripts.ingest_stocks --tier 1

  tier2:
    name: Tier 2 Stocks (hourly)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only runs on the top of each hour (when minute = 0)
    if: ${{ github.event.schedule == '*/15 * * * *' && startsWith(github.run_attempt, '1') }} 
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r scripts/requirements.txt
      - name: Ingest Tier 2 (on the hour)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: |
          MINUTE=$(date +%-M)
          if [ "$MINUTE" -eq 0 ]; then
            python -m scripts.ingest_stocks --tier 2
          else
            echo "Skipping Tier 2 (not top of hour)"
          fi

  tier3:
    name: Tier 3 Stocks (6hr)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r scripts/requirements.txt
      - name: Ingest Tier 3 (every 6 hours)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: |
          HOUR=$(date +%-H)
          if [ "$HOUR" -eq 0 ] || [ "$HOUR" -eq 6 ] || [ "$HOUR" -eq 12 ] || [ "$HOUR" -eq 18 ]; then
            MINUTE=$(date +%-M)
            if [ "$MINUTE" -lt 15 ]; then
              python -m scripts.ingest_stocks --tier 3
            fi
          fi
