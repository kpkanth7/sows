name: Ingest Stocks (Tiered)

# Three independent schedules. Each job runs ONLY for its own cron line
# (matched via github.event.schedule), so there is no fragile run_attempt
# gating and no wasted runner minutes spinning up jobs that immediately skip.
on:
  schedule:
    - cron: "*/15 * * * *"   # Tier 1
    - cron: "*/30 * * * *"   # Tier 2 (every 30 min) — bumped from hourly in Phase 2.11
    - cron: "0 */2 * * *"    # Tier 3 (every 2 hours)
  workflow_dispatch:
    inputs:
      tier:
        description: "Which tier to run (1, 2, or 3)"
        required: false
        default: "1"

env:
  PYTHONPATH: scripts

jobs:
  tier1:
    name: Tier 1 Stocks (15min)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    if: ${{ github.event.schedule == '*/15 * * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tier == '1') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r scripts/requirements.txt
      - name: Ingest Tier 1
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: |
          # Market-hours guard: skip nights/weekends to save quota.
          # Allow pre/post-market (9:00-16:59 ET, Mon-Fri). Always run on manual dispatch.
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            HOUR=$(TZ='America/New_York' date +%-H)
            DOW=$(TZ='America/New_York' date +%u)
            if [ "$DOW" -gt 5 ] || [ "$HOUR" -lt 9 ] || [ "$HOUR" -gt 16 ]; then
              echo "Market closed (DOW=$DOW HOUR=$HOUR ET) — skipping Tier 1."
              exit 0
            fi
          fi
          python scripts/ingest_stocks.py --tier 1

  tier2:
    name: Tier 2 Stocks (hourly)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event.schedule == '*/30 * * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tier == '2') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r scripts/requirements.txt
      - name: Ingest Tier 2
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: |
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            HOUR=$(TZ='America/New_York' date +%-H)
            DOW=$(TZ='America/New_York' date +%u)
            if [ "$DOW" -gt 5 ] || [ "$HOUR" -lt 9 ] || [ "$HOUR" -gt 16 ]; then
              echo "Market closed (DOW=$DOW HOUR=$HOUR ET) — skipping Tier 2."
              exit 0
            fi
          fi
          python scripts/ingest_stocks.py --tier 2

  tier3:
    name: Tier 3 Stocks (2hr)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event.schedule == '0 */2 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tier == '3') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r scripts/requirements.txt
      - name: Ingest Tier 3
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: |
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            HOUR=$(TZ='America/New_York' date +%-H)
            DOW=$(TZ='America/New_York' date +%u)
            if [ "$DOW" -gt 5 ] || [ "$HOUR" -lt 9 ] || [ "$HOUR" -gt 16 ]; then
              echo "Market closed (DOW=$DOW HOUR=$HOUR ET) — skipping Tier 3."
              exit 0
            fi
          fi
          python scripts/ingest_stocks.py --tier 3
