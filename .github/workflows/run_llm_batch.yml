name: LLM Batch Processing (Manual - Deprecated)

on:
  workflow_dispatch:

jobs:
  llm_batch:
    name: LLM Batch — Categorize, Disputes, Briefs
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONPATH: scripts
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r scripts/requirements.txt
      - name: Run LLM batch
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          LLM_PROVIDER_CHAIN: ${{ secrets.LLM_PROVIDER_CHAIN }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
        run: python -m scripts.run_llm_batch

  producthunt:
    name: Product Hunt Daily Launches
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      PYTHONPATH: scripts
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r scripts/requirements.txt
      - name: Ingest Product Hunt
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PRODUCTHUNT_CLIENT_ID: ${{ secrets.PRODUCTHUNT_CLIENT_ID }}
          PRODUCTHUNT_CLIENT_SECRET: ${{ secrets.PRODUCTHUNT_CLIENT_SECRET }}
        run: python -m scripts.ingest_producthunt

  influencer_trust:
    name: Update Influencer Trust Scores
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: scripts
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r scripts/requirements.txt
      - name: Update trust scores
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Phase 3.8: LLM-validated claims + decay. Wire the rotating chain.
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          LLM_PROVIDER_CHAIN: ${{ secrets.LLM_PROVIDER_CHAIN }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
        run: python scripts/update_influencer_trust.py
